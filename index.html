<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jardín Literario</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');

    body {
      background-color: #fffde7;
      font-family: 'Fredoka', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      color: #e67e22;
      text-align: center;
      font-size: clamp(1.8rem, 5vw, 2.5rem); 
      margin-bottom: 50px;
      text-shadow: 2px 2px 0px #fff;
    }

    .garden-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 900px;
      width: 100%;
    }

    .bubble {
      width: 100%;
      max-width: 280px; 
      min-height: 280px;
      background: white;
      border: 6px solid #f1c40f;
      border-radius: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 25px;
      box-sizing: border-box;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .bubble:nth-child(1) { border-color: #3498db; }
    .bubble:nth-child(2) { border-color: #e74c3c; }

    .bubble:hover {
      transform: scale(1.05); 
    }

    .bubble h3 { font-size: 1.5rem; color: #2c3e50; margin-bottom: 15px; }
    .bubble p { font-size: 1.1rem; color: #555; line-height: 1.3; margin-bottom: 25px; }

    .btn-action {
      padding: 15px 30px;
      background: #f1c40f;
      color: #7d5a00;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: 0 6px 0 #d35400;
      transition: all 0.2s;
    }

    .back-nav {
      margin-top: 60px;
      color: #34495e;
      text-decoration: none;
      font-size: 1.2rem;
      background: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .bubble {
        padding: 20px;
        min-height: 250px;
      }
      h1 { margin-bottom: 30px; }
    }
  </style>
</head>
<body>

  <h1>🌟 Jardín Literario Digital 🌟</h1>

  <main class="garden-container">
    <div class="bubble">
      <h3>✍️ ¡A escribir!</h3>
      <p>Vamos a conocernos y a compartir nuestras grandes metas.</p>
      <a href="a1.html" class="btn-action">¡Entrar!</a>
    </div>

    <div class="bubble">
      <h3>📚 ¡A explorar!</h3>
      <p>Descubre aplicaciones divertidas para aprender jugando.</p>
      <a href="a2.html" class="btn-action">¡Vamos!</a>
    </div>
  </main>

  <a href="index.html" class="back-nav">« Volver al inicio</a>

</body>
</html>
